spring.application.name=Conflict-Tracker-API

# ======================
# DATABASE
# ======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.query.plan_cache_max_size=0
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=0
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true

# ?? esta propiedad es obsoleta en Hibernate 6 (puedes quitarla)
# spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ======================
# HIKARI CONNECTION POOL
# ======================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000

spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ======================
# SQL INIT
# ======================
spring.sql.init.mode=never

# ======================
# SERVER
# ======================
server.port=${PORT:8080}