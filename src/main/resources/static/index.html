<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conflict Tracker API - Test Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { padding: 8px 12px; border: 1px solid #ccc; text-align: left; }
        th { background-color: #f2f2f2; }
        td.countries { white-space: pre-line; }
        form { max-width: 500px; margin-bottom: 50px; }
        form input, form select, form textarea { width: 100%; padding: 6px; margin-bottom: 12px; }
        form label { font-weight: bold; display: block; margin-bottom: 4px; }
        form button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
        .error { color: red; margin-bottom: 12px; }
    </style>
</head>
<body>

<h1>Conflict Tracker - Conflictos</h1>

<!-- Formulario de creación -->
<h2>Crear nuevo conflicto</h2>
<form id="createConflictForm">
    <div class="error" id="formError"></div>

    <label for="name">Nombre:</label>
    <input type="text" id="name" name="name" required>

    <label for="startDate">Fecha de inicio (YYYY-MM-DD):</label>
    <input type="date" id="startDate" name="startDate" required>

    <label for="status">Estado:</label>
    <select id="status" name="status" required>
        <option value="">--Selecciona--</option>
        <option value="ACTIVE">Activo</option>
        <option value="FROZEN">Inactivo</option>
        <option value="ENDED">Finalizado</option>
    </select>

    <label for="description">Descripción:</label>
    <textarea id="description" name="description" rows="3"></textarea>

    <label for="code">Codigo del Pais:</label>
    <input type="text" id="code" name="code" required>

    <button type="submit">Crear Conflicto</button>
</form>

<!-- Tabla de conflictos -->
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Fecha Inicio</th>
        <th>Estado</th>
        <th>Descripción</th>
        <th>Países</th>
    </tr>
    </thead>
    <tbody id="conflictsTableBody">
    <!-- Filas generadas por JS -->
    </tbody>
</table>

<script>
    const apiBase = '/api/v1/conflicts';

    async function loadConflicts() {
        try {
            const response = await fetch(apiBase);
            if (!response.ok) throw new Error('Error al cargar conflictos');

            const conflicts = await response.json();
            const tbody = document.getElementById('conflictsTableBody');
            tbody.innerHTML = '';

            conflicts.forEach(conflict => {
                const row = document.createElement('tr');

                const tdId = document.createElement('td');
                tdId.textContent = conflict.id;
                row.appendChild(tdId);

                const tdName = document.createElement('td');
                tdName.textContent = conflict.name;
                row.appendChild(tdName);

                const tdStartDate = document.createElement('td');
                tdStartDate.textContent = conflict.startDate;
                row.appendChild(tdStartDate);

                const tdStatus = document.createElement('td');
                tdStatus.textContent = conflict.status;
                row.appendChild(tdStatus);

                const tdDesc = document.createElement('td');
                tdDesc.textContent = conflict.description;
                row.appendChild(tdDesc);

                const tdCountries = document.createElement('td');
                tdCountries.classList.add('countries');
                if (conflict.countries && conflict.countries.length > 0) {
                    tdCountries.textContent = conflict.countries
                        .map(c => `${c.code} - ${c.name}`)
                        .join('\n');
                } else {
                    tdCountries.textContent = 'Sin países';
                }
                row.appendChild(tdCountries);

                tbody.appendChild(row);
            });

        } catch (error) {
            console.error(error);
            alert('No se pudieron cargar los conflictos');
        }
    }

    document.getElementById('createConflictForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('formError');
        errorDiv.textContent = '';

      const data = {
    name: document.getElementById('name').value.trim(),
    startDate: document.getElementById('startDate').value,
    status: document.getElementById('status').value,
    description: document.getElementById('description').value.trim(),
    countryCodes: [
        document.getElementById('code').value.trim()
    ]
};

        // Validación simple
        if (!data.name || !data.startDate || !data.status) {
            errorDiv.textContent = 'Por favor, rellena todos los campos obligatorios.';
            return;
        }

        try {
            const response = await fetch(apiBase, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                const errorData = await response.json();
                errorDiv.textContent = errorData.message || 'Error al crear conflicto';
                return;
            }

            // Reiniciar formulario y recargar tabla
            e.target.reset();
            await loadConflicts();
            alert('Conflicto creado correctamente');

        } catch (error) {
            console.error(error);
            errorDiv.textContent = 'Error al enviar los datos al servidor';
        }
    });

    // Cargar conflictos al iniciar
    window.onload = loadConflicts;
</script>
</body>
</html>
